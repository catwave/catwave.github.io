<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.R.E.A.D. Calculator</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.5rem; text-align: center; letter-spacing: 2px; }
        .row { margin-bottom: 1.2rem; }
        .label-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        label { font-weight: 600; color: #444; font-size: 0.9rem; }
        .val-display { font-weight: bold; background: #e9ecef; padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; min-width: 25px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #007bff; }
	.category-tag { font-size: 0.65rem; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        .tag-impact { background: #e3f2fd; color: #0d47a1; }
        .tag-likelihood { background: #fff3e0; color: #e65100; }
        .sub-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .metric-pill { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .metric-pill span { display: block; font-size: 0.7rem; text-transform: uppercase; color: #666; font-weight: bold; }
        .metric-pill b { font-size: 1.2rem; color: #222; }

        #result-box { margin-top: 1.5rem; padding: 1.5rem; border-radius: 8px; text-align: center; }
        .score-big { font-size: 3.5rem; font-weight: 800; display: block; line-height: 1; }

        .share-section { margin-top: 20px; text-align: center; border-top: 1px solid #eee; padding-top: 15px; }
        #share-link { color: #007bff; font-size: 0.85rem; word-break: break-all; text-decoration: none; font-weight: 600; }
        #share-link:hover { text-decoration: underline; }
        .copy-hint { font-size: 0.7rem; color: #999; display: block; margin-top: 5px; }

        .low { background-color: #d4edda; color: #155724; }
        .medium { background-color: #fff3cd; color: #856404; }
        .high { background-color: #f8d7da; color: #721c24; }
        .critical { background-color: #212529; color: #f8f9fa; }
    </style>
</head>
<body>

<div class="card">
    <h2>D.R.E.A.D. Rating Calculator</h2>
    
    <div class="row">
        <div class="label-group"><label>Damage <span class="category-tag tag-impact">Impact</span></label><span class="val-display" id="d-val">5</span></div>
        <input type="range" id="D" min="0" max="10" value="5">
    </div>

    <div class="row">
        <div class="label-group"><label>Reproducibility <span class="category-tag tag-likelihood">Likelihood</span></label><span class="val-display" id="r-val">5</span></div>
        <input type="range" id="R" min="0" max="10" value="5">
    </div>

    <div class="row">
        <div class="label-group"><label>Exploitability <span class="category-tag tag-likelihood">Likelihood</span></label><span class="val-display" id="e-val">5</span></div>
        <input type="range" id="E" min="0" max="10" value="5">
    </div>

    <div class="row">
        <div class="label-group"><label>Affected Users <span class="category-tag tag-impact">Impact</span></label><span class="val-display" id="a-val">5</span></div>
        <input type="range" id="A" min="0" max="10" value="5">
    </div>

    <div class="row">
        <div class="label-group"><label>Discoverability <span class="category-tag tag-likelihood">Likelihood</span></label><span class="val-display" id="x-val">5</span></div>
        <input type="range" id="X" min="0" max="10" value="5">
    </div>

    <div class="sub-metrics">
        <div class="metric-pill"><span>Impact (D+A)/2</span><b id="impact-score">5.0</b></div>
        <div class="metric-pill"><span>Likelihood (R+E+D)/3</span><b id="likelihood-score">5.0</b></div>
    </div>

    <div id="result-box" class="medium">
        <span class="score-big" id="total-score">5.0</span>
        <small id="level-label">Medium Risk</small>
    </div>

    <div class="share-section">
        <a href="#" id="share-link">Generating link...</a>
        <span class="copy-hint">Share this specific rating</span>
    </div>
</div>

<script>
    const ids = ['D', 'R', 'E', 'A', 'X'];

    function init() {
        // 1. Check URL for existing params (e.g. ?r=95482)
        const params = new URLSearchParams(window.location.search);
        const code = params.get('r');
        
        if (code && code.length === 5) {
            ids.forEach((id, index) => {
                const val = parseInt(code[index], 16);
                if (!isNaN(val)) document.getElementById(id).value = val;
            });
        }

        // 2. Attach listeners
        ids.forEach(id => {
            document.getElementById(id).addEventListener('input', calculate);
        });

        calculate();
    }

    function calculate() {
        const val = (id) => parseInt(document.getElementById(id).value);
        
        // Update number displays
        ids.forEach(id => {
            document.getElementById(id.toLowerCase() + '-val').innerText = val(id);
        });

        // Apply Formulas
        const impact = (val('D') + val('A')) / 2;
        const likelihood = (val('R') + val('E') + val('X')) / 3;
        const finalScore = (impact + likelihood) / 2;

        // Update UI
        document.getElementById('impact-score').innerText = impact.toFixed(1);
        document.getElementById('likelihood-score').innerText = likelihood.toFixed(1);
        document.getElementById('total-score').innerText = finalScore.toFixed(1);

        updateVisuals(finalScore);
        updateShareLink();
    }

    function updateVisuals(score) {
        const box = document.getElementById('result-box');
        const lbl = document.getElementById('level-label');
        box.className = ''; 

        if (score < 4) { box.classList.add('low'); lbl.innerText = "Low Risk"; }
        else if (score < 7) { box.classList.add('medium'); lbl.innerText = "Medium Risk"; }
        else if (score < 9) { box.classList.add('high'); lbl.innerText = "High Risk"; }
        else { box.classList.add('critical'); lbl.innerText = "Critical Risk"; }
    }

    function updateShareLink() {
        // Fix: Convert 10 to 'a' using toString(16)
        const code = ids.map(id => parseInt(document.getElementById(id).value).toString(16)).join('');
        const baseUrl = window.location.origin + window.location.pathname;
        const fullUrl = `${baseUrl}?r=${code}`;
        
        document.getElementById('share-link').href = fullUrl;
        document.getElementById('share-link').innerText = fullUrl;
        window.history.replaceState(null, '', `?r=${code}`);
    }

    // Start
    init();
</script>

</body>
</html>
